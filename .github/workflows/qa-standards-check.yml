name: "QA Standards Check"

on:
  pull_request:
    paths:
      - "e2e-tests/**"
      - "**/*.{ts,js,tsx,jsx}"

jobs:
  check-e2e-standards:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate E2E Standards
        shell: bash
        run: |
          set -uo pipefail

          E2E_INSTRUCTIONS_FILE=".github/instructions/qa-coding-guidelines.instructions.md"
          if [ ! -f "$E2E_INSTRUCTIONS_FILE" ]; then
            echo "::error::Missing instruction file: $E2E_INSTRUCTIONS_FILE"
            exit 1
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^e2e-tests/.*\.ts$' || true)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No e2e TypeScript files changed; skipping validation."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Checking $file"

            # Check file naming — annotation only, does not fail the build
            if grep -qi "\.spec\.ts" "$E2E_INSTRUCTIONS_FILE" && [[ "$file" != *.spec.ts ]]; then
              echo "::warning file=$file,line=1::qa-coding-guidelines: Test file must use .spec.ts suffix (e.g. login.spec.ts). Copilot review will flag this."
            fi

            # Check for hardcoded delays with line numbers
            if grep -qi "No hardcoded delays" "$E2E_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: Hardcoded delay detected. Use dynamic waits like waitForSelector() or waitForLoadState() instead."
              done < <(grep -nE 'setTimeout\s*\(|sleep\s*\(' "$file" 2>/dev/null || true)
            fi

            # Check for Playwright fixed timeout waits with line numbers
            if grep -qi "No hardcoded delays" "$E2E_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: Fixed wait timeout detected. Avoid waitForTimeout(number); use dynamic waits instead."
              done < <(grep -nE 'waitForTimeout\s*\(\s*[0-9]+' "$file" 2>/dev/null || true)
            fi

            # Check for CSS class selectors with line numbers
            if grep -qi "data-test-id" "$E2E_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: CSS class selector detected. Use data-test-id selectors instead (e.g. [data-test-id=\"submit\"])."
              done < <(grep -nE 'locator\s*\(("|\x27)\.' "$file" 2>/dev/null || true)
            fi

            # Check for CSS id selectors with line numbers
            if grep -qi "data-test-id" "$E2E_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: CSS id selector detected. Use data-test-id selectors instead (e.g. [data-test-id=\"submit\"])."
              done < <(grep -nE 'locator\s*\(("|\x27)#' "$file" 2>/dev/null || true)
            fi

            # Check for XPath selectors with line numbers
            if grep -qi "No CSS classes" "$E2E_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: XPath selector detected. Use data-test-id selectors instead."
              done < <(grep -nE 'locator\s*\(("|\x27)//' "$file" 2>/dev/null || true)
            fi

            # Check for missing async on test functions
            if grep -qi "Await all interactions" "$E2E_INSTRUCTIONS_FILE" && ! grep -q 'async (' "$file"; then
              first_test_line=$(grep -n "test(" "$file" | head -1 | cut -d: -f1)
              echo "::warning file=$file,line=$first_test_line::qa-coding-guidelines: Test function is not async. Add the 'async' keyword before the test callback."
            fi
          done

          echo "E2E standards annotation scan complete. Review Copilot comments on this PR for details."

  check-code-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Code Quality
        shell: bash
        run: |
          set -uo pipefail

          QUALITY_INSTRUCTIONS_FILE=".github/instructions/code-quality.instructions.md"
          if [ ! -f "$QUALITY_INSTRUCTIONS_FILE" ]; then
            echo "::error::Missing instruction file: $QUALITY_INSTRUCTIONS_FILE"
            exit 1
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\.(ts|tsx|js|jsx)$' || true)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No TypeScript/JavaScript files changed; skipping validation."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Checking $file"

            # Check for eval usage
            if grep -qi "No eval" "$QUALITY_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::code-quality: eval() is a security risk. Remove it."
              done < <(grep -nE 'eval\s*\(' "$file" 2>/dev/null || true)
            fi

            # Check for Function constructor
            while IFS= read -r match; do
              line_num=$(echo "$match" | cut -d: -f1)
              echo "::warning file=$file,line=$line_num::code-quality: new Function() is a security risk. Remove it."
            done < <(grep -nE 'new Function' "$file" 2>/dev/null || true)

            # Check for var usage
            if grep -qi "Const vs let" "$QUALITY_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::code-quality: Use const or let instead of var."
              done < <(grep -nE '\bvar\s+' "$file" 2>/dev/null || true)
            fi

            # Check for any type usage
            if grep -qi "avoid \`any\`" "$QUALITY_INSTRUCTIONS_FILE" || grep -qi "avoid .*any" "$QUALITY_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::code-quality: Avoid the 'any' type. Use a proper TypeScript type or add a suppression comment explaining why."
              done < <(grep -nE ':\s*any\b' "$file" 2>/dev/null || true)
            fi

            # Check for type assertions using 'as any'
            if grep -qi "avoid \`any\`" "$QUALITY_INSTRUCTIONS_FILE" || grep -qi "avoid .*any" "$QUALITY_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::code-quality: Avoid 'as any' assertions. Use a specific type or justify suppression explicitly."
              done < <(grep -nE '\bas\s+any\b' "$file" 2>/dev/null || true)
            fi

            # Check for magic numbers
            if grep -qi "No magic numbers" "$QUALITY_INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::code-quality: Magic number detected. Extract to a named constant."
              done < <(grep -nE '\b(1[0-9]{2}|[2-9][0-9]{2,})\b' "$file" 2>/dev/null || true)
            fi
          done

          echo "Code quality annotation scan complete. Review Copilot comments on this PR for details."
