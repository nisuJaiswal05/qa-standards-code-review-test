name: "QA Standards Check"

on:
  pull_request:
    paths:
      - "e2e-tests/**"
      - "**/*.{ts,js,tsx,jsx}"
    branches: [ main, develop ]

jobs:
  check-e2e-standards:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate E2E Standards
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'e2e-tests/**/*.ts')

          if [ ${#files[@]} -eq 0 ]; then
            echo "No e2e TypeScript files changed; skipping validation."
            exit 0
          fi

          failed=0
          annotations=()

          for file in "${files[@]}"; do
            echo "Checking $file"

            # Check file naming
            if [[ "$file" != *.spec.ts ]]; then
              echo "::error file=$file,line=1::File must use .spec.ts suffix"
              annotations+=("file=$file,line=1,title=File Naming::File must use .spec.ts suffix according to E2E guidelines")
              failed=1
            fi

            # Check for hardcoded delays with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::Hardcoded delays are not allowed. Use dynamic waits like waitForSelector() instead of setTimeout()"
              annotations+=("file=$file,line=$line_num,title=Hardcoded Delay::Hardcoded delays are not allowed. Use dynamic waits like waitForSelector() instead of setTimeout()")
              failed=1
            done < <(grep -nE 'setTimeout\s*\(|sleep\s*\(' "$file" 2>/dev/null || true)

            # Check for CSS class selectors with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::CSS class selectors are not allowed. Use data-test-id selectors instead of CSS classes for stable tests"
              annotations+=("file=$file,line=$line_num,title=CSS Selector::CSS class selectors are not allowed. Use data-test-id selectors instead of CSS classes for stable tests")
              failed=1
            done < <(grep -nE 'locator\s*\(("|\x27)\.' "$file" 2>/dev/null || true)

            # Check for XPath selectors with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::XPath selectors are not allowed. Use data-test-id selectors instead of XPath for stable tests"
              annotations+=("file=$file,line=$line_num,title=XPath Selector::XPath selectors are not allowed. Use data-test-id selectors instead of XPath for stable tests")
              failed=1
            done < <(grep -nE 'locator\s*\(("|\x27)//' "$file" 2>/dev/null || true)

            # Check for async/await with line numbers
            if ! grep -q 'async (' "$file"; then
              first_test_line=$(grep -n "test(" "$file" | head -1 | cut -d: -f1)
              echo "::error file=$file,line=$first_test_line::Test functions must be async. Add 'async' keyword before test function"
              annotations+=("file=$file,line=$first_test_line,title=Async Required::Test functions must be async. Add 'async' keyword before test function")
              failed=1
            fi
          done

          # Store annotations for PR comment
          if [ ${#annotations[@]} -gt 0 ]; then
            echo "annotations<<EOF" >> $GITHUB_OUTPUT
            echo "## 🚫 E2E Standards Violations" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            for annotation in "${annotations[@]}"; do
              IFS='::' read -r file_info line_info title message <<< "$annotation"
              echo "**$title** (Line $line_info)" >> $GITHUB_OUTPUT
              echo "> $message" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            done
            echo "### How to fix:" >> $GITHUB_OUTPUT
            echo "1. Use .spec.ts suffix for test files" >> $GITHUB_OUTPUT
            echo "2. Replace CSS class selectors with \`data-test-id\`" >> $GITHUB_OUTPUT
            echo "3. Replace setTimeout with dynamic waits like \`waitForSelector\`" >> $GITHUB_OUTPUT
            echo "4. Ensure test functions are async" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "### Examples:" >> $GITHUB_OUTPUT
            echo "❌ Bad: \`page.locator('.button')\`" >> $GITHUB_OUTPUT
            echo "✅ Good: \`page.locator('[data-test-id=\"submit-button\"]')\`" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "❌ Bad: \`setTimeout(1000)\`" >> $GITHUB_OUTPUT
            echo "✅ Good: \`page.waitForSelector('[data-test-id=\"element\"]')\`" >> $GITHUB_OUTPUT
            echo "annotations<<EOF" >> $GITHUB_OUTPUT
          fi

          if [ "$failed" -ne 0 ]; then
            echo "E2E standards check failed"
            exit 1
          fi

          echo "All E2E standards checks passed."
        id: e2e-check

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context;
            const issue_number = context.issue.number;
            const annotations = `${{ steps.e2e-check.outputs.annotations }}`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: annotations
            });

  check-code-quality:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Code Quality
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '**/*.{ts,js,tsx,jsx}')

          if [ ${#files[@]} -eq 0 ]; then
            echo "No TypeScript/JavaScript files changed; skipping validation."
            exit 0
          fi

          failed=0
          annotations=()

          for file in "${files[@]}"; do
            echo "Checking $file"

            # Check for eval usage with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::eval() is not allowed for security reasons"
              annotations+=("file=$file,line=$line_num,title=Security Risk::eval() is not allowed for security reasons")
              failed=1
            done < <(grep -nE 'eval\s*\(' "$file" 2>/dev/null || true)

            # Check for Function constructor with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::Function constructor is not allowed for security reasons"
              annotations+=("file=$file,line=$line_num,title=Security Risk::Function constructor is not allowed for security reasons")
              failed=1
            done < <(grep -nE 'new Function' "$file" 2>/dev/null || true)

            # Check for var usage with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::Use let/const instead of var for better scoping"
              annotations+=("file=$file,line=$line_num,title=Modern JavaScript::Use let/const instead of var for better scoping")
              failed=1
            done < <(grep -nE '\bvar\s+' "$file" 2>/dev/null || true)

            # Check for any type usage with line numbers
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::error file=$file,line=$line_num::Avoid using 'any' type. Use proper TypeScript types"
              annotations+=("file=$file,line=$line_num,title=Type Safety::Avoid using 'any' type. Use proper TypeScript types")
              failed=1
            done < <(grep -nE ':\s*any\b' "$file" 2>/dev/null || true)

            # Check for magic numbers (basic check) - warning only
            while IFS= read -r line; do
              line_num=$(echo "$line" | cut -d: -f1)
              echo "::warning file=$file,line=$line_num::Consider using named constants for large numbers"
              annotations+=("file=$file,line=$line_num,title=Code Quality::Consider using named constants for large numbers")
            done < <(grep -nE '\b(1[0-9]{2}|[2-9][0-9]{2,})\b' "$file" 2>/dev/null || true)
          done

          # Store annotations for PR comment
          if [ ${#annotations[@]} -gt 0 ]; then
            echo "annotations<<EOF" >> $GITHUB_OUTPUT
            echo "## 📋 Code Quality Issues" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            for annotation in "${annotations[@]}"; do
              IFS='::' read -r file_info line_info title message <<< "$annotation"
              echo "**$title** (Line $line_info)" >> $GITHUB_OUTPUT
              echo "> $message" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            done
            echo "### How to fix:" >> $GITHUB_OUTPUT
            echo "1. Remove eval() and Function constructor usage" >> $GITHUB_OUTPUT
            echo "2. Replace var with let/const" >> $GITHUB_OUTPUT
            echo "3. Use proper TypeScript types instead of any" >> $GITHUB_OUTPUT
            echo "4. Use named constants for magic numbers" >> $GITHUB_OUTPUT
            echo "annotations<<EOF" >> $GITHUB_OUTPUT
          fi

          if [ "$failed" -ne 0 ]; then
            echo "Code quality check failed"
            exit 1
          else
            echo "Code quality check passed"
          fi
        id: code-quality-check

      - name: Comment on PR
        if: failure() || steps.code-quality-check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context;
            const issue_number = context.issue.number;
            const annotations = `${{ steps.code-quality-check.outputs.annotations }}`;
            
            if (annotations && annotations.trim() !== '') {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: annotations
              });
            }
