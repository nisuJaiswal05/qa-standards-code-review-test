name: "QA: E2E Guideline Check"

on:
  pull_request:
    paths:
      - "e2e-tests/**" # Only triggers if files in this folder change

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required for posting review comments
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: GitHub Copilot Review
        uses: github/copilot-review-action@v1
        with:
          # Point directly to your sample markdown file
          instructions-path: .github/instructions/qa-coding-guidelines.instructions.md
