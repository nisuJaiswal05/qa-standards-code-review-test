name: "QA: E2E Guideline Check"

on:
  pull_request:
    paths:
      - "e2e-tests/**"

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate E2E QA Guidelines
        shell: bash
        run: |
          set -uo pipefail

          INSTRUCTIONS_FILE=".github/instructions/qa-coding-guidelines.instructions.md"
          if [ ! -f "$INSTRUCTIONS_FILE" ]; then
            echo "::error::Missing instruction file: $INSTRUCTIONS_FILE"
            exit 1
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^e2e-tests/.*\.ts$' || true)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No e2e TypeScript files changed; skipping guideline validation."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Checking $file"

            if grep -qi "\.spec\.ts" "$INSTRUCTIONS_FILE" && [[ "$file" != *.spec.ts ]]; then
              echo "::warning file=$file,line=1::qa-coding-guidelines: Test file must use .spec.ts suffix (e.g. login.spec.ts)."
            fi

            if grep -qi "No hardcoded delays" "$INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: Hardcoded delay detected. Use dynamic waits (waitForSelector/waitForLoadState)."
              done < <(grep -nE 'setTimeout\s*\(|sleep\s*\(' "$file" 2>/dev/null || true)
            fi

            if grep -qi "data-test-id" "$INSTRUCTIONS_FILE"; then
              while IFS= read -r match; do
                line_num=$(echo "$match" | cut -d: -f1)
                echo "::warning file=$file,line=$line_num::qa-coding-guidelines: CSS class or XPath selector detected. Use data-test-id selectors instead."
              done < <(grep -nE 'locator\s*\(("|\x27)\.|locator\s*\(("|\x27)//' "$file" 2>/dev/null || true)
            fi
          done

          echo "E2E QA guideline annotation scan complete. Review Copilot comments on this PR for details."
