name: "Request Copilot Code Review for E2E Changes"

# Triggers only when a PR is opened or updated with e2e-tests changes.
# Automatically requests GitHub Copilot as a reviewer so the AI review
# runs with the guidelines defined in .github/copilot-instructions.md
# and the path-scoped rules in .github/instructions/.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "e2e-tests/**"

permissions:
  pull-requests: write # Required to add a reviewer to the PR
  contents: read # Required for actions/checkout

jobs:
  request-copilot-review:
    name: Request Copilot Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Verify instruction files are present
        # Fail fast if a required instruction file is missing; this prevents
        # Copilot from reviewing without the QA guidelines in place.
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Assert qa-coding-guidelines instruction file exists
        shell: bash
        run: |
          INSTRUCTIONS_FILE=".github/instructions/qa-coding-guidelines.instructions.md"
          if [ ! -f "$INSTRUCTIONS_FILE" ]; then
            echo "::error::Required file $INSTRUCTIONS_FILE is missing. Copilot review cannot be configured without it."
            exit 1
          fi
          echo "Instruction file verified: $INSTRUCTIONS_FILE"

      - name: Assert copilot-instructions.md exists
        shell: bash
        run: |
          COPILOT_INSTRUCTIONS=".github/copilot-instructions.md"
          if [ ! -f "$COPILOT_INSTRUCTIONS" ]; then
            echo "::error::Required file $COPILOT_INSTRUCTIONS is missing. Create it from the template in the repo README."
            exit 1
          fi
          echo "Copilot instructions file verified: $COPILOT_INSTRUCTIONS"

      - name: Request Copilot as reviewer
        # Requests GitHub Copilot code review via the app_slugs field.
        # This uses the correct GitHub API shape for app-based reviewers.
        #
        # PREREQUISITE: Copilot Code Review must be enabled first:
        #   Repository Settings → Copilot → Code review → Enable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          echo "Requesting Copilot code review for PR #$PR_NUMBER in $REPO"

          # Capture both the response body and HTTP status for diagnostics.
          # Copilot Code Review is a GitHub App reviewer — use app_slugs, not reviewers.
          RESPONSE=$(
            curl --silent --write-out "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
              -d '{"reviewers":[],"team_reviewers":[],"app_slugs":["copilot-pull-request-reviewer"]}'
          )

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "API response body: $BODY"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 201 ]; then
            echo "Copilot review successfully requested for PR #$PR_NUMBER"
          elif [ "$HTTP_STATUS" -eq 422 ]; then
            # 422 can mean the app slug is already a reviewer, OR Copilot review is not enabled.
            # Log the body so the exact reason is visible in the workflow run logs.
            echo "::warning::HTTP 422 received. This usually means Copilot Code Review is not enabled in repository Settings, or it is already requested."
            echo "Go to: Settings → Copilot → Code review → Enable, then re-run this workflow."
          elif [ "$HTTP_STATUS" -eq 404 ]; then
            echo "::error::HTTP 404 — app slug 'copilot-pull-request-reviewer' not found. Ensure Copilot Code Review is enabled: Settings → Copilot → Code review."
            exit 1
          else
            echo "::error::Unexpected HTTP $HTTP_STATUS when requesting Copilot review. See response body above."
            exit 1
          fi

      - name: Post instruction summary as PR comment
        # Posts a one-time comment listing which guideline files will govern
        # this review, so contributors know exactly what Copilot will enforce.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Only post the comment when the PR is first opened to avoid duplicates.
          EVENT_ACTION="${{ github.event.action }}"
          if [ "$EVENT_ACTION" != "opened" ]; then
            echo "PR event is '$EVENT_ACTION' — skipping review summary comment (only posted on 'opened')."
            exit 0
          fi

          COMMENT_BODY=$(cat <<'EOF'
          ## 🤖 GitHub Copilot Code Review — Active Guidelines

          This PR touches `e2e-tests/` files. GitHub Copilot will review it using the following instruction files:

          | File | Applies To |
          |------|-----------|
          | [`.github/copilot-instructions.md`](.github/copilot-instructions.md) | All files (global) |
          | [`.github/instructions/qa-coding-guidelines.instructions.md`](.github/instructions/qa-coding-guidelines.instructions.md) | `e2e-tests/**/*.ts` |
          | [`.github/instructions/code-quality.instructions.md`](.github/instructions/code-quality.instructions.md) | `**/*.{ts,js,tsx,jsx}` |

          ### Key rules Copilot will enforce:
          - ✅ `data-test-id` selectors only (no CSS classes, no XPath)
          - ✅ All browser interactions must be `await`-ed
          - ✅ No `setTimeout` / `sleep` — use dynamic waits
          - ✅ Test files must end with `.spec.ts`
          - ✅ No hardcoded credentials or magic strings
          - ✅ Tests must be independent (parallel-safe)

          Violations will be marked `🔴 BLOCKING` or `🟡 SUGGESTION` inline on the diff.
          EOF
          )

          curl --silent --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": $(echo "$COMMENT_BODY" | jq -Rs .)}"

          echo "Review guidelines comment posted to PR #$PR_NUMBER"
